      const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem(CONST.THEME_KEY, next);
      updateThemeButton(next);
    }
    function loadTheme() {
      const saved = localStorage.getItem(CONST.THEME_KEY) || 'light';
      document.documentElement.setAttribute('data-theme', saved);
      updateThemeButton(saved);
    }
    function updateThemeButton(t) {
      document.getElementById('themeToggleBtn').innerHTML = t === 'dark'
        ? '<span class="side-btn-icon">🌙</span><span class="side-btn-label">夜</span>'
        : '<span class="side-btn-icon">☀</span><span class="side-btn-label">昼</span>';
    }

    /* ── 寸法計算 ── */
    function calculateDimensions() {
      Drum.viewportHeight = document.getElementById('drumViewport').clientHeight;
      Drum.rowHeight = Drum.viewportHeight / App.visibleRows;
      Drum.centerOffset = Math.floor(App.visibleRows / 2);
      const hl = document.getElementById('centerHighlight');
      hl.style.top    = `${Drum.centerOffset * Drum.rowHeight}px`;
      hl.style.height = `${Drum.rowHeight}px`;
    }

    function handleResize() {
      requestAnimationFrame(() => {
        // 表示行数（5/7/9）切り替えアニメーション中は、こちらの再計算とアニメーション側の
        // 再計算が競合し、行の大きさがガクガクと行き来する不具合の原因になっていた。
        // 原因: アニメーション中は列幅（文字サイズに連動）が毎フレーム縮む/広がることで
        // #drumViewportの実際の横幅（min-width経由）も変化し、それをResizeObserverが検知して
        // このhandleResize()を呼んでしまう。ここでcalculateDimensions()を実行すると、
        // アニメーション側がまだApp.visibleRowsを確定させていない（アニメーション完了時に確定する）
        // ため、古い行数を基準にDrum.rowHeightを計算し直してしまい、アニメーションの値を
        // 一瞬引き戻してしまっていた。アニメーション中はこちらの処理をまるごとスキップし、
        // 再計算はアニメーション側（applyVisibleRowsFrame）に一任する。
        if (Drum.visibleRowsAnimationId) return;
        calculateDimensions();
        updateColumnWidths();
        document.getElementById('drumContainer').querySelectorAll('.table-row').forEach(r => {
          r.style.height   = `${Drum.rowHeight}px`;
          r.style.fontSize = calcFontSize();
          applyBtnSize(r);
        });
        applyRowPositions(Drum.dragOffset);
        updateTabTapZones(); // 画面回転・リサイズでタブの位置・幅が変わるため、当たり判定も再計算する
      });
    }

    /* ── 表示行数（5/7/9）切り替え ──
       タブバー右端の「rowsToggleBtn」を押すたびに、この3段階を巡回で切り替える。
       単純にDrum.rowHeightを書き換えるだけだと瞬間的に切り替わってしまうため、行の縦間隔
       （Drum.rowHeight）・中央行オフセット（Drum.centerOffset）をease-out cubicで連続的に補間し、
       毎フレームapplyVisibleRowsFrame()を呼んで文字サイズ・列幅・ボタンサイズも一緒に
       再計算することで、間隔だけでなく見た目全体が滑らかに変化するようにしている
       （animateScrollLeft()と同じイージング・同じ設計方針）。 */

    // 指定した行の高さ・中央行オフセットを実際にDOMへ反映する（アニメーションの1フレーム分の処理）。
    // アニメーション中は補間された連続値（非整数）を、完了時は確定した最終値を渡して呼ぶ。
    function applyVisibleRowsFrame(rowHeight, centerOffset) {
      Drum.rowHeight = rowHeight;
      Drum.centerOffset = centerOffset;
      const hl = document.getElementById('centerHighlight');
      hl.style.top    = `${centerOffset * rowHeight}px`;
      hl.style.height = `${rowHeight}px`;
      updateColumnWidths();
      document.getElementById('drumContainer').querySelectorAll('.table-row').forEach(r => {
        r.style.height   = `${rowHeight}px`;
        r.style.fontSize = calcFontSize();
        applyBtnSize(r);
      });
      applyRowPositions(Drum.dragOffset);
    }

    function animateVisibleRowsChange(targetRows) {
      if (targetRows === App.visibleRows) return;
      if (Drum.visibleRowsAnimationId) cancelAnimationFrame(Drum.visibleRowsAnimationId);

      // 表示中のタブが無い（ドラム自体が非表示）場合は、アニメーションさせる対象が無いため
      // 値の更新だけ行う。次にタブが表示された時点でcalculateDimensions()が新しい行数を反映する。
      if (!App.activeTabId || !Drum.viewportHeight) {
        App.visibleRows = targetRows;
        localStorage.setItem(VISIBLE_ROWS_KEY, String(targetRows));
        updateVisibleRowsButton();
        return;
      }

      const fromRowHeight    = Drum.rowHeight;
      const fromCenterOffset = Drum.centerOffset;
      const toRowHeight    = Drum.viewportHeight / targetRows;
      const toCenterOffset = Math.floor(targetRows / 2);
      const t0 = performance.now();

      // アニメーション中は列幅（文字サイズに連動）が変化し、テーブル全体の横幅
      // （--grid-min-width）も一緒に変わる。もし横スクロールが右側にずれた状態のまま
      // アニメーションを始めると、列幅が縮んでスクロール可能範囲が狭くなった瞬間に、
      // ブラウザ側が横スクロール位置を強制的に補正（クランプ）することがあり、これが
      // 「アニメーション終了直後にガクッと動く」ように見える原因になりうる。
      // アニメーション開始時点で横スクロールを左端に戻し、常に有効な範囲内（0は必ず有効）に
      // 収めておくことで、ブラウザ側の強制補正が起きる余地そのものを無くす。
      cancelAutoHScroll();
      setHorizontalScroll(0);

      function step(now) {
        const t = Math.min((now - t0) / CONST.VISIBLE_ROWS_ANIM_DURATION, 1);
        if (t < 1) {
          const ease = 1 - Math.pow(1 - t, 3);
          applyVisibleRowsFrame(
            fromRowHeight    + (toRowHeight    - fromRowHeight)    * ease,
            fromCenterOffset + (toCenterOffset - fromCenterOffset) * ease
          );
          Drum.visibleRowsAnimationId = requestAnimationFrame(step);
        } else {
          // アニメーション開始時にキャッシュしたビューポート高さ（toRowHeightの元になった値）と、
          // 実際のビューポート高さがズレていることがある（アニメーション中に列幅が変化することで
          // 横スクロールバーが出現/消滅する等、副次的にビューポートの実高さが変わりうるため）。
          // ズレたまま確定させると、直後に（アニメーション中は抑制していた）ResizeObserver由来の
          // handleResize()が実測値で再計算し直し、その差分でガクッと動いて見える不具合があった。
          // アニメーション完了のこの時点で改めてcalculateDimensions()を呼んで実測し直すことで、
          // 以後handleResize()が呼ばれても再計算結果が完全に一致し、ズレが生じないようにする。
          App.visibleRows = targetRows;
          calculateDimensions();
          applyVisibleRowsFrame(Drum.rowHeight, Drum.centerOffset);
          setHorizontalScroll(0); // 列幅変化に追従して、最終的な左端位置を改めて確定させる
          localStorage.setItem(VISIBLE_ROWS_KEY, String(targetRows));
          updateVisibleRowsButton();
          Drum.visibleRowsAnimationId = null;
        }
      }
      Drum.visibleRowsAnimationId = requestAnimationFrame(step);
    }

    // ボタンを押すたびにVISIBLE_ROWS_OPTIONSを順番に巡回する（5→7→9→5→…）
    function cycleVisibleRows() {
      const idx  = VISIBLE_ROWS_OPTIONS.indexOf(App.visibleRows);
      const next = VISIBLE_ROWS_OPTIONS[(idx + 1) % VISIBLE_ROWS_OPTIONS.length];
      animateVisibleRowsChange(next);
    }

    // ボタンの表示文字を現在の表示行数に同期させる
    function updateVisibleRowsButton() {
      const btn = document.getElementById('rowsToggleBtn');
      if (btn) btn.textContent = String(App.visibleRows);
    }

    // Drum.rowHeight から選択パネルのトリガー枠の高さ(px, 数値)を計算する。
    // .panel-trigger（78%・最小38px）と.jokyo-cell-inner（同じく78%・最小38px、v0.53で統一済み）の
    // 両方で同じ式を使っているため、dynamicColumnWidth()内の重複を避けるために共通関数化した。
    const calcTriggerH = () => Math.max(38, Drum.rowHeight * 0.78);

    // Drum.rowHeight から文字サイズ(px, 数値)を計算する。
    // 以前は上限を26pxに固定していたため、行の高さ（画面サイズ）が大きい端末では、
    // セルの大きさに対して文字が相対的にかなり小さく見えてしまっていた（v0.78で上限を撤廃）。
    // その後さらに「もっと大きく」という依頼があったため、行の高さに対する比率自体を
    // 0.185→0.22に引き上げ、セルに対する文字の占める割合を大きくした
    // （下限の11pxのみ、極端に行が低い場合の可読性維持のために残している）。
    // dynamicColumnWidth()内の列幅計算もこの関数を参照しており、値がズレないよう一本化している。
    const calcFontPx = () => Math.max(11, Drum.rowHeight * 0.22);
    const calcFontSize = () => `${calcFontPx()}px`;

    // Drum.rowHeightからヘッダー行（列名の行）の高さ(px, 数値)を計算する。
    // 以前は36px固定（文字サイズも22px固定）だったため、表示行数（5/7/9）を切り替えても
    // ヘッダーの見た目だけ変化しなかった。本体セルと同じ「Drum.rowHeightに連動する」設計に揃え、
    // 表示行数切り替え時にヘッダーの高さ・文字サイズも一緒に滑らかにアニメーションするようにした
    // （文字サイズ自体はcalcFontPx()を本体セルとそのまま共用し、書式を統一している）。
    // 比率0.36・下限24pxは、旧固定値（36px高さ・22px文字）が実機でおおよそrowHeight≒100px前後
    // （5行表示時の一般的なiPadの値）だったことから逆算した目安値。
    const calcHeaderH = () => Math.max(24, Drum.rowHeight * 0.36);

    // ↑同ボタンのサイズをDrum.rowHeight/3の正方形で設定（常にDrum.rowHeightを直参照）
    function applyBtnSize(rowEl) {
      const sz  = Math.max(20, Math.floor(Drum.rowHeight / 3));
      const fz  = Math.max(8,  Math.floor(sz * 0.32));
      const rad = Math.max(4,  Math.floor(sz * 0.2));
      rowEl.querySelectorAll('.cell-copy-btn').forEach(btn => {
        btn.style.width        = `${sz}px`;
        btn.style.height       = `${sz}px`;
        btn.style.fontSize     = `${fz}px`;
        btn.style.borderRadius = `${rad}px`;
      });
    }

    // 行の高さ・文字サイズをセット（ボタンはiHTML設定後にapplyBtnSizeで別途適用）
    function applyRowStyle(rowEl) {
      rowEl.style.height   = `${Drum.rowHeight}px`;
      rowEl.style.fontSize = calcFontSize();
    }

    /* ── レンダリング ── */
    const escHtml   = s => String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const isZeroNum = v => v === '' || v === undefined || v === 0 || v === '0';
    const numDisp   = v => isZeroNum(v) ? '—' : v;
    const copyBtnHtml = (field, ri) =>
      `<button class="cell-copy-btn" onclick="copyFieldFromAbove(event,${ri},'${field}')">↑同</button>`;

    // 1列分のセルHTMLを、列のtypeに応じて生成する（アクティブ行用）
    function buildActiveCellHtml(col, rowIndex, d) {
      switch (col.type) {
        case 'select': {
          return `
            ${copyBtnHtml(col.key, rowIndex)}
            <button class="panel-trigger" onclick="openPanel(event,'${col.key}',${rowIndex})">
              <span class="trigger-text${d[col.key] ? '' : ' empty'}">${escHtml(d[col.key] || '—')}</span>
              <span class="trigger-arrow">▼</span>
            </button>`;
        }
        case 'select_with_nums': {
          const numsHtml = col.nums.map(n => `
                <div class="num-input-group">
                  ${n.label ? `<span class="num-label">${escHtml(n.label)}</span>` : ''}
                  <button class="num-step-btn minus" onclick="stepNumField(${rowIndex},'${n.key}',-1)">－</button>
                  <div class="num-display" onclick="openNumpad(${rowIndex},'${n.key}','${escJs(n.label || col.label)}')" id="${numDispId(n.key, rowIndex)}">${numDisp(d[n.key])}</div>
                  <button class="num-step-btn plus"  onclick="stepNumField(${rowIndex},'${n.key}',1)">＋</button>
                  ${n.unit ? `<span class="num-unit">${escHtml(n.unit)}</span>` : ''}
                </div>`).join('');
          return `
            <div class="jokyo-cell-inner">
              ${copyBtnHtml(col.key, rowIndex)}
              <button class="jokyo-panel-trigger" onclick="openPanel(event,'${col.key}',${rowIndex})">
                <span class="trigger-text${d[col.key] ? '' : ' empty'}">${escHtml(d[col.key] || '—')}</span>
                <span class="trigger-arrow">▼</span>
              </button>
              <div class="jokyo-nums-stack">${numsHtml}</div>
            </div>`;
        }
        case 'counter': {
          return `
            <div class="counter-control">
              <span class="counter-value" id="counter_${col.key}_${rowIndex}">${d[col.key]}</span>
              <div class="counter-btns">
                <button class="counter-btn plus"  onclick="updateCounter(${rowIndex},'${col.key}',1)">▲</button>
                <button class="counter-btn minus" onclick="updateCounter(${rowIndex},'${col.key}',-1)">▼</button>
              </div>
            </div>`;
        }
        case 'text': {
          return `
            <input type="text" class="text-input" value="${escHtml(d[col.key])}" placeholder="memo"
              oninput="saveText(${rowIndex},'${col.key}',this.value)"
              onchange="refreshActiveRow()"
              onfocus="this.select()">`;
        }
        default:
          return '';
      }
    }

    // 1列分のセルHTMLを、列のtypeに応じて生成する（非アクティブ行用）
    function buildInactiveCellHtml(col, d) {
      switch (col.type) {
        case 'select':
          return `<span class="inactive-value">${escHtml(d[col.key] || '—')}</span>`;
        case 'select_with_nums': {
          const rowsHtml = col.nums.map(n =>
            `<div class="jokyo-inactive-row">${n.label ? escHtml(n.label) : ''}<span class="num-val">${numDisp(d[n.key])}${(!isZeroNum(d[n.key]) && n.unit) ? ' ' + escHtml(n.unit) : ''}</span></div>`
          ).join('');
          return `
            <div class="jokyo-inactive">
              <span class="jokyo-inactive-left">${escHtml(d[col.key] || '—')}</span>
              <div class="jokyo-inactive-right">${rowsHtml}</div>
            </div>`;
        }
        case 'counter':
          return `<span class="inactive-value">${d[col.key]}</span>`;
        case 'text':
          return `<span class="inactive-value">${escHtml(d[col.key] || '—')}</span>`;
        default:
          return '';
      }
    }

    function renderAllRows() {
      const container = document.getElementById('drumContainer');
      container.innerHTML = '';
      const d = getData();
      for (let i = 0; i < CONST.TOTAL_ROWS; i++) {
        const row = createRowElement(i, d);
        applyBtnSize(row);
        container.appendChild(row);
      }
      applyRowPositions(0);
    }

    function createRowElement(rowIndex, dataArr) {
      const d   = (dataArr || getData())[rowIndex];
      const columns = getColumns();
      const row = document.createElement('div');
      row.className = 'table-row';
      row.dataset.rowIndex = rowIndex;
      applyRowStyle(row);

      if (rowIndex === Drum.currentRow) {
        row.classList.add('active');
        const cellsHtml = columns.map(col =>
          `<div class="table-cell">${buildActiveCellHtml(col, rowIndex, d)}</div>`
        ).join('');
        row.innerHTML = `<div class="table-cell"><span class="row-number">${rowIndex + 1}</span></div>${cellsHtml}`;
      } else {
        const cellsHtml = columns.map(col =>
          `<div class="table-cell">${buildInactiveCellHtml(col, d)}</div>`
        ).join('');
        row.innerHTML = `<div class="table-cell"><span class="row-number">${rowIndex + 1}</span></div>${cellsHtml}`;
      }
      // innerHTML設定後のボタンサイズ適用は、呼び元でapplyBtnSize(row)を実行する
      return row;
    }

    /* ── ドラムスクロール ── */
    function applyRowPositions(pixelOffset) {
      // viewHはDrum.viewportHeight（calculateDimensions()でキャッシュ済み）を使う。
      // 表示行数切り替えアニメーション中はDrum.rowHeightが連続的に変化するため、
      // 「rowHeight×行数」で毎回逆算するとビューポートの実際の高さとズレることがあるため、
      // 実測したビューポート高さそのものを直接使う。
      const viewH = Drum.viewportHeight;
      // ポインター操作を許可する範囲。中央行オフセット（Drum.centerOffset）が大きいほど
      // （表示行数が多いほど）その分だけ外側の行まで操作可能にする必要があるため、
      // 固定値ではなくcenterOffsetに応じて計算する（5行表示＝offset2の時は従来通り2.5になる）。
      const pointerEdgeDist = Drum.centerOffset + 0.5;
      document.getElementById('drumContainer').querySelectorAll('.table-row').forEach(row => {
        const idx  = parseInt(row.dataset.rowIndex);
        const rel  = (idx - Drum.currentRow) - (pixelOffset / Drum.rowHeight);
        const top  = (rel + Drum.centerOffset) * Drum.rowHeight;
        const dist = Math.abs(rel);
        row.style.transform = `translateY(${top}px)`;
        row.style.opacity   = Math.max(0.3, 1 - dist * 0.3);
        const hidden = top < -Drum.rowHeight || top > viewH + 10;
        row.style.visibility    = hidden ? 'hidden' : 'visible';
        row.style.pointerEvents = (hidden || dist >= pointerEdgeDist) ? 'none' : 'auto';
      });
    }

    // アニメーションの最終処理（行の確定・アクティブ行の再構築・行送り時のスクロールリセット等）を
    // 1箇所にまとめた共通処理。通常はanimateToRow内のrAFループが最後まで完了した時点（t===1）で呼ぶが、
    // 途中で別の操作（新しいタップ・ドラッグの開始）によってアニメーションが中断された場合にも、
    // 表示を中途半端な位置のまま放置しないよう、この関数で即座に目標行へ確定させる用途にも使う
    // （handleDragStartから呼ばれる。詳しい経緯はHANDOVER_NOTES.md参照）。
    function settleAtRow(target) {
      const fromRow = Drum.currentRow;
      Drum.currentRow = target; Drum.targetRow = target; Drum.dragOffset = 0;
      document.getElementById('drumContainer').querySelectorAll('.table-row').forEach(row => {
        const idx = parseInt(row.dataset.rowIndex);
        const shouldBeActive = idx === Drum.currentRow;
        if (shouldBeActive !== row.classList.contains('active')) {
          row.classList.toggle('active', shouldBeActive);
          row.innerHTML = rebuildRowHtml(idx);
          applyBtnSize(row);
        }
      });
      applyRowPositions(0); updateRowInfo();
      // 別の行へ移動した場合、スクロールが左端でなければ左端に戻す。
      // 新しい行の入力は左から始まるため、スクロール位置をリセットして全列が見える状態にする。
      // 同じ行へのタップ（fromRow === target）では発動しない。
      // ワープ（瞬間移動）ではなく、animateScrollLeft()で滑らかに戻す。
      if (target !== fromRow && scrollWrapper.scrollLeft > 0) {
        animateScrollLeft(0);
      }
    }

    function animateToRow(target) {
      // ドラッグを離した瞬間の表示位置（Drum.dragOffset）から滑らかにアニメーションをつなげる。
      // 以前はここを必ず0から始めていたため、ドラッグを離した瞬間に一度「ドラッグ前の位置」へ
      // 戻ってから目的の行へ動き出すように見えてしまっていた（ガチャリと吸い付く感触が失われていた）。
      const startOff  = Drum.dragOffset;
      if (Drum.animationId) cancelAnimationFrame(Drum.animationId);
      target = clampRow(target);
      const targetOff = (target - Drum.currentRow) * Drum.rowHeight;
      const t0 = performance.now();
      function step(now) {
        const t    = Math.min((now - t0) / CONST.ANIM_DURATION, 1);
        const ease = 1 - Math.pow(1 - t, 3);
        applyRowPositions(startOff + (targetOff - startOff) * ease);
        if (t < 1) {
          Drum.animationId = requestAnimationFrame(step);
        } else {
          Drum.animationId = null;
          settleAtRow(target);
        }
      }
      Drum.animationId = requestAnimationFrame(step);
    }

    /* ── イベント ── */
    // タッチ操作可能な環境かどうか（PCのマウス操作と挙動を分けるための判定）
    const IS_TOUCH_DEVICE = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

    function setupEvents() {
      // タッチ: scroll-wrapperで受け取る（縦=JS制御、横もJSでscrollLeftを直接操作。
      // drum-viewportがtouch-action:noneのため、ネイティブのpan-xには委ねられない）
      scrollWrapper.addEventListener('touchstart',  handleDragStart, { passive: true });
      scrollWrapper.addEventListener('touchmove',   handleDragMove,  { passive: false });
      scrollWrapper.addEventListener('touchend',    handleDragEnd);
      scrollWrapper.addEventListener('touchcancel', handleDragEnd);
      // マウス: viewport/windowで受け取る
      document.getElementById('drumViewport').addEventListener('mousedown', handleDragStart);
      window.addEventListener('mousemove', handleDragMove);
      window.addEventListener('mouseup',   handleDragEnd);
      // タップ行ジャンプ
      document.getElementById('drumViewport').addEventListener('click', handleRowTap);

      // ── ヘッダーを本体の横スクロールに追従させる ──
      // タッチのネイティブpan-x・マウスホイール（下のwheelハンドラ）のどちらでも
      // 最終的にscrollWrapper.scrollLeftが変わるので、scrollイベント1か所で追従できる。
      const headerWrapper = document.getElementById('tableHeaderWrapper');
      scrollWrapper.addEventListener('scroll', () => {
        headerWrapper.scrollLeft = scrollWrapper.scrollLeft;
      }, { passive: true });

      // ── PC向け: マウスホイール操作 ──
      // 縦ホイール（deltaY優勢）→ 行送り、横ホイール／Shift+ホイール（deltaX優勢）→ テーブル横スクロール
      scrollWrapper.addEventListener('wheel', e => {
        e.preventDefault();
        if (Math.abs(e.deltaX) > Math.abs(e.deltaY)) {
          cancelAutoHScroll(); // 手動の横スクロールが自動アニメーションと競合しないよう止める
          scrollWrapper.scrollLeft += e.deltaX;
        } else if (e.deltaY !== 0) {
          navigateRow(e.deltaY > 0 ? 1 : -1);
        }
      }, { passive: false });


      // ── ブラウザ標準ジェスチャーとの競合防止（タッチデバイスのみ） ──
      // PCでのマウス右クリック・検証ツールの利用を妨げないよう、タッチ環境のみに限定する
      if (IS_TOUCH_DEVICE) {
        // ピンチズーム（Safariのgesturestart/change/end）を抑止
        ['gesturestart', 'gesturechange', 'gestureend'].forEach(evt =>
          document.addEventListener(evt, e => e.preventDefault()));

        // 長押しによるテキスト選択メニュー・コンテキストメニューを抑止
        // （備考欄・自由入力欄はテキスト操作が必要なため除外）
        document.addEventListener('contextmenu', e => {
          if (!e.target.closest('input[type="text"]')) e.preventDefault();
        });

        // ダブルタップズームは viewport の user-scalable=no と
        // gesturestart/change/end の preventDefault で抑止済みのため、
        // ここでの touchend 介入は不要（むしろ連続タップを妨げるため削除）。
      }
    }

    const getCoords = e => ({
      x: e.touches ? e.touches[0].clientX : e.clientX,
      y: e.touches ? e.touches[0].clientY : e.clientY
    });

    function handleDragStart(e) {
      if (e.target.closest('input, button')) return;
      const c = getCoords(e);
      // 直前の行送りアニメーションがまだ完了していない場合、ここでcancelAnimationFrameするだけでは
      // 表示がアニメーション途中の中途半端な位置のまま固まってしまうことがあった
      // （後続のタップが横方向の動きと判定されると、行確定処理・横スクロール確定処理のどちらも
      // 呼ばれずに終わるケースがあったため）。新しい操作を始める前に、必ずsettleAtRow()で
      // 直前の目標行（Drum.targetRow）へ即座に確定させてから次の操作に入る。
      if (Drum.animationId) {
        cancelAnimationFrame(Drum.animationId);
        Drum.animationId = null;
        settleAtRow(Drum.targetRow);
      }
      // 自動横スクロールのアニメーション中にユーザーが新しい操作を始めた場合、
      // 自動側のアニメーションが手動操作と競合しないよう止めておく
      cancelAutoHScroll();
      Drum.isDragging = true; Drum.isVerticalDrag = null; Drum.tapMoved = false;
      Drum.startY = c.y; Drum.lastY = c.y; Drum.lastScrollX = c.x;
      Drum.lastTime = performance.now(); Drum.velocity = 0;
      // 画面の左右端（戻る/進むジェスチャー領域）から開始したドラッグかを記録
      Drum.isEdgeStart = (c.x <= CONST.EDGE_ZONE || c.x >= window.innerWidth - CONST.EDGE_ZONE);
    }

    function handleDragMove(e) {
      if (!Drum.isDragging) return;
      const c  = getCoords(e);
      const dx = Math.abs(c.x - Drum.lastScrollX), dy = Math.abs(c.y - Drum.startY);
      if (dx > CONST.DRAG_THRESHOLD || dy > CONST.DRAG_THRESHOLD) Drum.tapMoved = true;

      // 画面端から始まったタッチは、縦横の方向判定（DRAG_THRESHOLD到達）を待たず、
      // 最初のtouchmoveの時点でできるだけ早くpreventDefault()する。
      // iOSの画面端スワイプ（戻る/進むナビゲーション、ホーム画面追加後のスタンドアロン表示でも発動しうる）は
      // タッチ開始からごくわずかな移動量でジェスチャー認識が始まるため、DRAG_THRESHOLD（5px）を
      // 超えるのを待ってからpreventDefaultすると間に合わず、ナビゲーション側が先に発動してしまうことがあった。
      // isEdgeStartが立っている間は、方向が確定する前でも毎回preventDefaultしておくことで、
      // このタイミングのズレによる誤発動（画面が一瞬崩れて見える等）を防ぐ。
      if (Drum.isEdgeStart && e.cancelable) e.preventDefault();

      // しきい値を超えた時点で縦か横かを確定
      if (Drum.isVerticalDrag === null) {
        if (dx > CONST.DRAG_THRESHOLD || dy > CONST.DRAG_THRESHOLD) Drum.isVerticalDrag = dy >= dx;
        return;
      }

      if (Drum.isVerticalDrag) {
        if (e.cancelable) e.preventDefault();
        const now = performance.now(), delta = Drum.lastY - c.y;
        if (now > Drum.lastTime) Drum.velocity = delta / (now - Drum.lastTime) * 16;
        Drum.dragOffset += delta;
        const maxOff = (CONST.TOTAL_ROWS - 1 - Drum.currentRow) * Drum.rowHeight;
        const minOff = -Drum.currentRow * Drum.rowHeight;
        if      (Drum.dragOffset > maxOff) Drum.dragOffset = maxOff + (Drum.dragOffset - maxOff) * 0.2;
        else if (Drum.dragOffset < minOff) Drum.dragOffset = minOff + (Drum.dragOffset - minOff) * 0.2;
        applyRowPositions(Drum.dragOffset);
        Drum.lastY = c.y; Drum.lastTime = now;
      } else {
        // 横スクロール: drum-viewportがtouch-action:noneのため、その内側（実際にタッチする行セル）では
        // ブラウザのネイティブpan-xが効かない（touch-actionの有効値は祖先との交差で決まるため）。
        // そのため、タッチ・マウスどちらもJSで直接scrollLeftを操作する。
        if (e.cancelable) e.preventDefault();
        scrollWrapper.scrollLeft -= (c.x - Drum.lastScrollX);
        Drum.lastScrollX = c.x;
      }
    }

    function handleDragEnd() {
      if (!Drum.isDragging) return;
      Drum.isDragging = false;
      if (!Drum.isVerticalDrag) return;
      const next = clampRow(Drum.currentRow + Math.round((Drum.dragOffset + Drum.velocity * 5) / Drum.rowHeight));
      Drum.targetRow = next;
      animateToRow(next);
    }

    function handleRowTap(e) {
      if (Drum.tapMoved) return;
      const row = e.target.closest('.table-row');
      if (!row || row.classList.contains('active') || e.target.closest('input, button')) return;
      const idx = parseInt(row.dataset.rowIndex);
      if (!isNaN(idx)) { Drum.targetRow = idx; animateToRow(idx); }
    }

    // 連打対応: 目標行を累積管理（Drum.targetRowはDrumオブジェクト定義時に初期化済み）

    function navigateRow(dir) {
      Drum.targetRow = clampRow(Drum.targetRow + dir);
      animateToRow(Drum.targetRow);
    }

    // 右側ツールバーの▲ボタン：1行目へジャンプする
    function jumpToFirstRow() {
      Drum.targetRow = 0;
      animateToRow(Drum.targetRow);
    }

    // 行に何か入力があるかどうかを判定する（isZeroNumと同じ「空」の基準で全フィールドを見る。
    // _autoFillSuppress_* のような内部メタフラグは対象外）
    function rowHasData(row) {
      return Object.keys(row).some(k => !k.startsWith('_autoFillSuppress_') && !isZeroNum(row[k]));
    }

    // 右側ツールバーの▼ボタン：何らかの入力がある一番下の行へジャンプする（無ければ1行目）
    function jumpToLastFilledRow() {
      const data = getData();
      let target = 0;
      for (let i = data.length - 1; i >= 0; i--) {
        if (rowHasData(data[i])) { target = i; break; }
      }
      Drum.targetRow = target;
      animateToRow(Drum.targetRow);
    }

    function updateRowInfo() {
      document.getElementById('rowInfo').textContent = `${Drum.currentRow + 1}/${CONST.TOTAL_ROWS}`;
      document.getElementById('btnUp').disabled   = Drum.currentRow === 0;
      document.getElementById('btnDown').disabled = Drum.currentRow === CONST.TOTAL_ROWS - 1;
    }

    // 選択肢の使用頻度（キー: "panelType:value"、値: 回数）
    // CONST.FREQ_KEY と App.freqData はそれぞれの定義時に初期化済み

    function loadFreq() {
      try { App.freqData = JSON.parse(localStorage.getItem(CONST.FREQ_KEY) || '{}'); }
      catch { App.freqData = {}; }
    }

    function saveFreq() {
      localStorage.setItem(CONST.FREQ_KEY, JSON.stringify(App.freqData));
    }

    function bumpFreq(type, value) {
      const key = `${type}:${value}`;
      App.freqData[key] = (App.freqData[key] || 0) + 1;
      saveFreq();
    }

    function getFreq(type, value) {
      return App.freqData[`${type}:${value}`] || 0;
    }

    // パネル内の選択肢を使用頻度順に並び替え（多いほど中央に近づく）
    function sortPanelOptions(type) {
      const panel = document.getElementById(PANEL_ID_OF(type));
      const scroll = panel.querySelector('.panel-options-scroll');
      const options = [...scroll.querySelectorAll('.panel-option')];

      // 全選択肢の頻度がすべて同じ（多くは未使用で全部0回）の場合は、
      // 並び替えを行わず元の配列順（columns定義のoptions順）のまま表示する
      const freqs = options.map(opt => getFreq(type, opt.textContent));
      const allSame = freqs.every(f => f === freqs[0]);
      if (allSame) return;

      // 頻度でソート（降順）。同率は元の順序を維持（stableSort）
      options.sort((a, b) => getFreq(type, b.textContent) - getFreq(type, a.textContent));

      // 中央から外側へジグザグに配置する（1番目=中央、2番目=ひとつ上、3番目=ひとつ下、4番目=さらに上…）
      // これにより使用頻度が高い選択肢ほどパネルを開いた瞬間に見える中央付近に集まる
      const n = options.length;
      const arranged = new Array(n);
      const center = Math.floor((n - 1) / 2);
      const upCapacity   = center;            // 中央より上に置けるスロット数
      const downCapacity = n - 1 - center;    // 中央より下に置けるスロット数
      let upUsed = 0, downUsed = 0;
      options.forEach((opt, i) => {
        let pos;
        if (i === 0) {
          pos = center;
        } else if (i % 2 === 1 && upUsed < upCapacity) {
          // 奇数番目は上側へ（上側に空きがある場合）
          upUsed++;
          pos = center - upUsed;
        } else if (downUsed < downCapacity) {
          // 偶数番目、または上側が埋まった場合は下側へ
          downUsed++;
          pos = center + downUsed;
        } else {
          // 下側も埋まった場合は上側の残りへ（要素数が偏った構成の保険）
          upUsed++;
          pos = center - upUsed;
        }
        arranged[pos] = opt;
      });

      // 選択肢のみを中央寄せ済みの順で再配置する
      scroll.innerHTML = '';
      arranged.forEach(opt => scroll.appendChild(opt));
    }
    function openPanel(event, type, rowIndex) {
      event.stopPropagation();
      closeAllPanels();
      closeMeishoNumZone(); // 念のため数字ゾーンをリセット
      Panel.activeType = type; Panel.activeRow = rowIndex;
      const panel = document.getElementById(PANEL_ID_OF(type));
      const rect  = event.currentTarget.getBoundingClientRect();
      // 頻度順に並び替えてから選択状態をハイライト
      sortPanelOptions(type);
      panel.querySelectorAll('.panel-option').forEach(opt =>
        opt.classList.toggle('selected', opt.textContent === getData()[rowIndex][type]));
      const pw = CONST.PANEL_WIDTH;
      panel.style.left  = `${Math.max(CONST.PANEL_GAP, Math.min(rect.left, window.innerWidth - pw - CONST.PANEL_GAP))}px`;
      panel.style.width = `${pw}px`;
      panel.classList.add('open');
      document.getElementById('panelBackdrop').classList.add('open');
      adjustPanelScrollAlignment(panel);
      openPanelActionsZone();
    }

    // 自由入力欄・クリアボタンの固定パネル（panelActionsZone）を、現在開いている選択パネルの右隣
    // （数字サブゾーンが開いている場合はそのさらに右隣）に表示する。
    // 自由入力・クリアの対象列はPanel.activeTypeを見るため、毎回作り直さず1つのDOMを共有して使う。
    function openPanelActionsZone() {
      document.getElementById('panelActionsFreeText').value = '';
      renderTempOptions(Panel.activeType);
      positionPanelActionsZone();
      document.getElementById('panelActionsZone').classList.add('open');
    }

    function closePanelActionsZone() {
      document.getElementById('panelActionsZone').classList.remove('open');
    }

    // 選択パネル・数字サブゾーンの現在の表示状態から、アクションパネルを置くべき位置（右隣）を計算する。
    // 数字サブゾーンが開いていればそのさらに右隣、開いていなければ選択パネルの右隣に配置する。
    // 右端からはみ出す場合は、基準にした要素の左側に配置する。
    // 「基準要素(baseEl)の右隣に幅targetWidthの要素を配置し、画面右端を超える場合は左側に
    // フォールバックする」という位置計算を行う共通ヘルパー。パネルアクションゾーン・数字サブゾーンの
    // どちらも同じ考え方で右隣配置を行うため、ここに集約している。
    function calcSideBySideLeft(baseLeft, baseWidth, targetWidth) {
      const gap = CONST.PANEL_GAP;
      let left = baseLeft + baseWidth + gap;
      if (left + targetWidth > window.innerWidth - gap) left = baseLeft - targetWidth - gap;
      return left;
    }

    function positionPanelActionsZone() {
      const zone = document.getElementById('panelActionsZone');
      const zoneWidth = parseFloat(getComputedStyle(zone).width) || CONST.PANEL_ACTIONS_WIDTH;
      const numZone = document.getElementById('meishoNumZone');
      const baseEl = numZone.classList.contains('open') ? numZone
                   : document.getElementById(PANEL_ID_OF(Panel.activeType));
      if (!baseEl) return;
      const baseLeft  = parseFloat(baseEl.style.left) || CONST.PANEL_GAP;
      const baseWidth = parseFloat(baseEl.style.width) || baseEl.getBoundingClientRect().width;
      zone.style.left = `${calcSideBySideLeft(baseLeft, baseWidth, zoneWidth)}px`;
    }

    // アクションパネルの自由入力欄からの確定（OKボタン）。対象列はPanel.activeTypeを使う。
    // 確定した値は通常の選択処理に加え、一時選択肢としてもパネルアクションゾーンに積み上がる。
    // selectPanelOption内でcloseAllPanels()が呼ばれてPanel.activeTypeがnullに戻るため、
    // 先に対象列キーを変数へ保持しておく。
    function confirmFreeInputFromActionsZone() {
      if (Panel.activeType === null) return;
      const colKey = Panel.activeType;
      const val = document.getElementById('panelActionsFreeText').value.trim();
      if (!val) return;
      selectPanelOption(colKey, val);
      addTempOption(App.activeTabId, colKey, val);
      renderTempOptions(colKey);
    }

    /* ── 自由入力で確定した値の一時選択肢化 ──
       タブID・列キーごとに一時選択肢の配列を保持する。同じ値を複数回入力しても重複させず、
       既存のものを末尾（最新）に移動する。Excel出力が成功した時点で全タブ・全列分をまとめて消去する。
    */
    function addTempOption(tabId, colKey, value) {
      if (!App.tempOptions[tabId]) App.tempOptions[tabId] = {};
      const list = App.tempOptions[tabId][colKey] || [];
      const without = list.filter(v => v !== value);
      without.push(value);
      App.tempOptions[tabId][colKey] = without;
    }

    function getTempOptions(tabId, colKey) {
      return (App.tempOptions[tabId] && App.tempOptions[tabId][colKey]) || [];
    }

    function clearAllTempOptions() {
      App.tempOptions = {};
      // パネルを開いた状態でExcel出力した場合に備えて、表示中の一時選択肢欄も合わせて更新する
      if (Panel.activeType !== null) renderTempOptions(Panel.activeType);
    }

    // 一時選択肢エリア（自由入力行の直上）を、現在のタブ・列の最新状態で再描画する。
    // パネルアクションゾーンを開くたび・自由入力確定のたびに呼ばれる。
    function renderTempOptions(colKey) {
      const container = document.getElementById('panelActionsTempOptions');
      const list = getTempOptions(App.activeTabId, colKey);
      container.innerHTML = list.map(v =>
        `<div class="panel-actions-temp-option" onclick="selectPanelOption('${colKey}','${escJs(v)}')">${escHtml(v)}</div>`
      ).join('');
    }

    // アクションパネルのクリアボタン。対象列はPanel.activeTypeを使う。
    function clearFieldFromActionsZone() {
      if (Panel.activeType === null) return;
      clearFieldFromPanel(Panel.activeType);
    }

    // 選択肢の中央寄せ（justify-content: center）は、自由入力欄〜クリアボタンの合計の高さが
    // スクロール領域に収まる場合のみ有効。収まらない場合は中央寄せをやめて先頭から並べる
    // （flex-start）ことで、自由入力欄やクリアボタンがスクロールしても出てこない画面外領域に
    // 押し出されてしまう問題を防ぐ。CSSのjustify-content: safe centerはSafari 18未満で
    // 効かないため、JS側で確実に判定する。
    function adjustPanelScrollAlignment(panel) {
      const scroll = panel.querySelector('.panel-options-scroll');
      if (!scroll) return;
      const fitsWithoutScroll = scroll.scrollHeight <= scroll.clientHeight;
      scroll.style.justifyContent = fitsWithoutScroll ? 'center' : 'flex-start';
    }

    function onPanelBackdropClick() {
      // 数字ゾーンが開いている場合は数字なしで確定
      if (Panel.pendingMeishoBase !== null) {
        confirmMeishoWithNum(null);
      } else {
        closeAllPanels();
      }
    }

    function closeAllPanels() {
      document.querySelectorAll('.select-panel.open').forEach(el => el.classList.remove('open'));
      document.getElementById('panelBackdrop').classList.remove('open');
      closeMeishoNumZone();
      closePanelActionsZone();
      Panel.activeType = null; Panel.activeRow = null;
    }

    function selectPanelOption(type, value, freqValue) {
      if (Panel.activeRow === null) return;
      const rowData = getData()[Panel.activeRow];
      rowData[type] = value;
      // 外部タブの「破損」選択時など、特定の値が選ばれた瞬間だけ働く単発の初期値ルールを適用する
      applyOneShotFillRule(rowData, type, value);
      // 名称列の数字付き値（例:「外部1」）は、パネル上の表示名（例:「外部」）で頻度を記録する
      bumpFreq(type, freqValue !== undefined ? freqValue : value);
      // この列がautoFillの対象列であれば、パネルから選び直したことを伝え、クリア抑制状態を解除する
      const rule = getActiveAutoFillRule();
      const autoFillOptions = (rule && rule.target === type) ? { userSelected: true } : undefined;
      saveData(Panel.activeRow, autoFillOptions); refreshActiveRow(); closeAllPanels();
      // 選択した列の次の列が画面内に収まるようスクロールする（DOM再構築後に実行）
      requestAnimationFrame(() => scrollToNextColumn(type));
    }

    // 指定列の「次の列」が scrollWrapper の右端より外にはみ出している場合、
    // その列の右端がちょうど見えるところまでスクロールする。
    // 入力が右列へ進む流れを想定し、「選択した列」ではなく「次の列の右端」を基準にする。
    // 次の列が存在しない（備考欄が最後）場合は現在の列の右端を基準にする。
    // 入力したセルの幅だけ右にスクロールする。
    // これにより「入力したセルがあった画面上の位置」に次のセルが移動してきて、
    // 左から順に入力する際に手動スクロールが不要になる。
    // すでに右端まで到達していてスクロール余地がない場合は何もしない。
    function scrollToNextColumn(type) {
      const columns = getColumns();
      const idx = columns.findIndex(c => c.key === type);
      if (idx === -1) return;
      // 入力したセルの幅を取得（No.列が先頭にあるため +1 オフセット）
      const activeRow = document.getElementById('drumContainer').querySelector('.table-row.active');
      if (!activeRow) return;
      const cells = activeRow.querySelectorAll('.table-cell');
      const cell = cells[idx + 1]; // +1 は No.列分
      if (!cell) return;
      const cellWidth = cell.getBoundingClientRect().width;
      // すでに右端まで行っている場合はスクロールしない
      const maxScrollLeft = getMaxScrollLeft();
      if (scrollWrapper.scrollLeft >= maxScrollLeft) return;
      // ワープ（瞬間移動）ではなく、animateScrollLeft()で滑らかに動かす。
      animateScrollLeft(Math.min(scrollWrapper.scrollLeft + cellWidth, maxScrollLeft));
    }

    function clearFieldFromPanel(...fields) {
      if (Panel.activeRow === null) return;
      const d = getData()[Panel.activeRow];
      const def = emptyRowFor(getColumns());
      fields.forEach(f => { d[f] = def[f]; });
      // クリアした列にautoFillの対象列が含まれていれば、明示的なクリアとして自動再セットを抑制する
      const rule = getActiveAutoFillRule();
      const autoFillOptions = (rule && fields.includes(rule.target)) ? { explicitClear: true } : undefined;
      saveData(Panel.activeRow, autoFillOptions); refreshActiveRow(); closeAllPanels();
    }

    // 指定行のHTMLを再生成して返す（既存のDOM要素への .innerHTML 代入用）。
    // createRowElement はDOM要素ごと新規生成するため、innerHTML取得だけが目的の場合は
    // このヘルパーを使うことでダミー要素の生成・破棄コストを避けられる。
    function rebuildRowHtml(rowIndex) {
      return createRowElement(rowIndex).innerHTML;
    }

    function refreshActiveRow() {
      const el = document.getElementById('drumContainer').querySelector('.table-row.active');
      if (!el) return;
      el.innerHTML = rebuildRowHtml(parseInt(el.dataset.rowIndex));
      applyBtnSize(el);
    }

    /* ── hasNumSuffix列の数字サブ選択（名称列以外でも、将来hasNumSuffix:trueの列があれば共通で使える） ──
       Panel.pendingNumSuffixCol / Panel.pendingMeishoBase はPanelオブジェクト定義時に初期化済み
    */

    function openMeishoNumZone(colKey, baseValue) {
      // すでに同じ選択肢で数字ゾーンが開いている状態で再度同じ選択肢をタップした場合は、
      // 数字選択を待たずそのまま数字なしで確定する
      if (Panel.pendingMeishoBase === baseValue && Panel.pendingNumSuffixCol === colKey) {
        confirmMeishoWithNum(null);
        return;
      }
      Panel.pendingNumSuffixCol = colKey;
      Panel.pendingMeishoBase = baseValue;
      document.getElementById('meishoNumLabel').textContent = baseValue;
      // パネルの右隣に位置セット
      const panel = document.getElementById(PANEL_ID_OF(colKey));
      const panelLeft  = parseFloat(panel.style.left)  || CONST.PANEL_GAP;
      const panelWidth = parseFloat(panel.style.width) || CONST.PANEL_WIDTH;
      const zone = document.getElementById('meishoNumZone');
      zone.style.left = `${calcSideBySideLeft(panelLeft, panelWidth, CONST.NUM_ZONE_WIDTH)}px`;
      zone.classList.add('open');
      positionPanelActionsZone(); // 数字サブゾーンが開いたことで、アクションゾーンの基準位置が変わるため再計算
    }

    function closeMeishoNumZone() {
      document.getElementById('meishoNumZone').classList.remove('open');
      Panel.pendingMeishoBase = null;
      Panel.pendingNumSuffixCol = null;
    }

    function confirmMeishoWithNum(num) {
      if (Panel.pendingMeishoBase === null || Panel.pendingNumSuffixCol === null) return;
      const value = num !== null ? `${Panel.pendingMeishoBase}${num}` : Panel.pendingMeishoBase;
      // 頻度記録はパネル上の表示名（数字なしのベース名）で行う。
      // これにより「外部1」「外部2」のように数字違いの値も「外部」というひとつの選択肢としてまとめて学習される。
      selectPanelOption(Panel.pendingNumSuffixCol, value, Panel.pendingMeishoBase);
      closeMeishoNumZone();
    }
    function copyFieldFromAbove(event, rowIndex, field) {
      event.stopPropagation();
      if (rowIndex === 0) return;
      const prev = getData()[rowIndex - 1][field];
      if (!prev || prev === 0) return;
      const rowData = getData()[rowIndex];
      rowData[field] = prev;
      // 外部タブの「破損」コピー時など、特定の値が入った瞬間だけ働く単発の初期値ルールを適用する
      applyOneShotFillRule(rowData, field, prev);
      saveData(rowIndex); refreshActiveRow();
      showToast(prev + ' copied');
      // 選択肢パネル確定時と同様、コピーした列の次の列が見える位置まで自動スクロールする
      // （DOM再構築後に実行するため1フレーム待つ）
      requestAnimationFrame(() => scrollToNextColumn(field));
    }

    /* ── テンキー ── */
    // 数値項目の表示要素IDを組み立てる（列キー＋行番号で一意）
    const numDispId = (field, rowIndex) => `numdisp_${field}_${rowIndex}`;

    function openNumpad(rowIndex, field, label) {
      Numpad.targetRow = rowIndex; Numpad.targetField = field;
      Numpad.value = String(getData()[rowIndex][field] || '');
      document.getElementById('numpadLabel').textContent   = label || field;
      document.getElementById('numpadDisplay').textContent = Numpad.value || '0';
      document.getElementById('numpadOverlay').classList.add('show');
    }

    function closeNumpad() {
      document.getElementById('numpadOverlay').classList.remove('show');
      Numpad.targetRow = null; Numpad.targetField = null; Numpad.value = '';
    }

    // v0.94で桁数上限を撤廃した。以前はCONST.NUMPAD_MAX_DIGITSで数字の桁数（小数点は除く）を
    // 制限していたが、依頼により制限そのものを取り払ったため、桁数チェックは行わない。
    function numpadInput(d) {
      Numpad.value = (Numpad.value === '0' || Numpad.value === '') ? d : Numpad.value + d;
      document.getElementById('numpadDisplay').textContent = Numpad.value;
    }

    // 小数点ボタン。すでに小数点が入力済みの場合は無視する（1つの数値に小数点は1つまで）。
    // 空欄の状態で押した場合は「0.」から始める（先頭桁欠落での見た目の不自然さを防ぐ）。
    function numpadDecimal() {
      if (Numpad.value.includes('.')) return;
      Numpad.value = (Numpad.value === '') ? '0.' : Numpad.value + '.';
      document.getElementById('numpadDisplay').textContent = Numpad.value;
    }

    function numpadBackspace() {
      Numpad.value = Numpad.value.slice(0, -1);
      document.getElementById('numpadDisplay').textContent = Numpad.value || '0';
    }

    // 行データのある数値系フィールドを更新し、保存・該当DOM要素のテキスト更新・行再描画までを行う共通処理。
    // displayElId: 値を反映するDOM要素のid。displayText: 表示用テキスト（省略時はvalueそのまま）
    function commitFieldUpdate(rowIndex, field, value, displayElId, displayText) {
      getData()[rowIndex][field] = value;
      saveData(rowIndex);
      const el = document.getElementById(displayElId);
      if (el) el.textContent = displayText !== undefined ? displayText : value;
      refreshActiveRow();
    }

    function numpadConfirm() {
      if (Numpad.targetRow !== null && Numpad.targetField !== null) {
        // 末尾が小数点のまま確定された場合（例:「12.」）は、小数点だけ取り除いて保存する
        const value = Numpad.value.endsWith('.') ? Numpad.value.slice(0, -1) : Numpad.value;
        commitFieldUpdate(
          Numpad.targetRow, Numpad.targetField, value,
          numDispId(Numpad.targetField, Numpad.targetRow), numDisp(value)
        );
      }
      closeNumpad();
    }

    /* ── 数値増減・箇所・備考 ── */
    // 浮動小数点演算特有の誤差（例: 62.1 - 1 が 61.099999999999994 になる等）を取り除くための丸め。
    // 小数第6位までを基準に丸めることで、実用上使うであろう桁数（L/W・mm値は通常小数1〜2桁程度）の
    // 精度はそのまま保ちつつ、演算誤差だけを除去する。
    const roundFloat = v => Math.round((v + Number.EPSILON) * 1e6) / 1e6;

    // ±ボタン。テンキーで小数（例:「12.5」）を入力した後でも小数部分を消さずに増減できるよう、
    // parseInt ではなく parseFloat を使っている（parseIntのままだと小数部分が切り捨てられてしまう）。
    // 加算後にroundFloat()を通しているのは、浮動小数点演算の誤差（±ボタンを連打すると
    // 61.099999999999994のような極小の誤差が蓄積して表示されてしまう不具合）を防ぐため。
    function stepNumField(rowIndex, field, delta) {
      const next = roundFloat(Math.max(0, Math.min(9999, (parseFloat(getData()[rowIndex][field]) || 0) + delta)));
      commitFieldUpdate(rowIndex, field, next, numDispId(field, rowIndex), numDisp(next));
    }

    function updateCounter(rowIndex, field, delta) {
      const next = getData()[rowIndex][field] + delta;
      if (next < 0) return;
      commitFieldUpdate(rowIndex, field, next, `counter_${field}_${rowIndex}`);
    }

    // oninput（1文字ごと）ではデータ保存のみ行い、再レンダリングはしない。
    // 再レンダリング（refreshActiveRow）はonchange（フォーカスが外れた時）に行う。
    // oninputのたびにrefreshActiveRowを呼ぶと、1文字入力するたびにinput要素が
    // 再生成されてフォーカスが飛び、連続入力できなくなるため、この2段階構成にしている。
    function saveText(rowIndex, field, value) { getData()[rowIndex][field] = value; saveData(rowIndex); }


    /* ── ファイルダウンロード共通処理（Excel出力・バックアップ書き出しで共通利用） ── */
    // iOS判定（Safariはdownload属性を無視するため、ファイル名の付与有無を分ける必要がある）
    const IS_IOS_DEVICE = /iP(hone|ad|od)/.test(navigator.userAgent) ||
                          (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

    // 現在時刻から「YYYYMMDD_HHMMSS」形式のタイムスタンプ文字列を生成する（ファイル名の一部として使用）
    function genTimestamp() {
      const now = new Date();
      const p = n => String(n).padStart(2, '0');
      return `${now.getFullYear()}${p(now.getMonth()+1)}${p(now.getDate())}_${p(now.getHours())}${p(now.getMinutes())}${p(now.getSeconds())}`;
    }

    // Blobをファイルとしてダウンロードする。
    // iOSのSafariは <a download="..."> 属性を無視するため、MIMEタイプを工夫して対応する。
    //   - xlsx: application/octet-stream にすることで「Unknown.xlsx」ではなく正しいファイル名で保存できる
    //   - json: 同じく application/octet-stream にすることで、インライン表示を避けつつ
    //     ファイル名の拡張子（.json）もそのまま保持される（createJsonBackupFile 側で変換済み。
    //     以前使っていた text/plain は、実機で「.json.txt」のように拡張子が二重に付いてしまう
    //     不具合があったため、xlsxと同じapplication/octet-streamに統一した）
    // 非iOS環境では元のMIMEタイプ・download属性をそのまま使う。
    // revokeObjectURLまでの待機時間もiOSのみ長めにしている（ダウンロード処理がblob URLを
    // 参照し終えるまでに時間がかかるため、早く解放すると失敗することがある）。
    function downloadBlob(blob, fileName) {
      // iOSでxlsxを渡す場合、MIMEタイプをapplication/octet-streamに変換してファイル名を保持する
      const iosBlob = (IS_IOS_DEVICE && blob.type === 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet')
        ? new Blob([blob], { type: 'application/octet-stream' })
        : blob;
      const url = URL.createObjectURL(iosBlob);
      const a = document.createElement('a');
      a.href = url;
      if (!IS_IOS_DEVICE) a.download = fileName;
      else a.download = fileName; // iOSでもdownload属性をセットしておく（将来のSafari対応への布石）
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), IS_IOS_DEVICE ? 10000 : 5000);
    }

    /* ── Excel出力（iOS/iPad対応） ── */
    // タブの columns 定義から、出力列のヘッダー名一覧・列幅一覧・行データ抽出関数を組み立てる
    function buildExportSpec(columns) {
      const headers = ['No.'];
      const widths  = [5];
      // [{ field, isNum, hasNumSuffix, asText }] … 各出力列がどのデータキーを参照するか
      const fieldPlan = [];

      // 1つの出力列をheaders/widths/fieldPlanにまとめて追加する。
      // asText: 数値項目（isNum:true）を、実際の数値型セルではなく文字列として書き出すかどうか。
      // 「損傷の状況」のL/W・mm（jokyoNum1/2）は小数を扱うため、数値セルとして出力すると
      // Excel側のセル書式（列幅・表示形式）によっては小数部分が表示されないことがあった。
      // 文字列として書き出せば、入力した通りの見た目でそのまま表示される。
      // なお、SheetJSは既定（ignoreEC未指定＝true相当）で「数値に見える文字列」セルに対する
      // Excelの警告（左上の緑三角・「数値が文字列として保存されています」等）を自動的に抑止する
      // マークを付けてくれるため、asTextにしたセルでも警告は表示されない。
      const addExportColumn = (header, width, field, isNum, hasNumSuffix = false, asText = false) => {
        headers.push(header);
        widths.push(width);
        fieldPlan.push({ field, isNum, hasNumSuffix, asText });
      };

      // データを持たない、見た目だけの区切り用の空白列を追加する（field: nullなのでtabRows側では常に空文字になる）。
      // 建具①②・傾斜①②タブは「仕上げ材」列自体が無く（TAB_COLUMN_OVERRIDESのomitで削除）、
      // 「損傷の状況」の数値項目も1つ（mm）しか持たない（内部①②・外部タブは仕上げ材あり・
      // length/widthの2項目）ため、そのままでは出力列数が2列少なくなり、Excel上でタブごとに
      // 列位置がずれて並んでしまう。ここで空白列を差し込み、全タブの列数・列位置をExcel上で揃える。
      const addBlankColumn = () => addExportColumn('', 3, null, false);

      const hasShiage = columns.some(c => c.key === 'shiage');

      columns.forEach(col => {
        if (col.type === 'select_with_nums') {
          addExportColumn(col.key, 12, col.key, false);
          col.nums.forEach(n => addExportColumn(n.exportLabel || n.key, 6, n.key, true, false, true));
          // 標準（内部①②・外部タブ）はnumsが2件（length/width）。それに満たない分（建具・傾斜タブの
          // mm1件のみ）は、widthに相当する位置に空白列を補って列数を揃える。
          for (let i = col.nums.length; i < 2; i++) addBlankColumn();
        } else if (col.type === 'counter') {
          addExportColumn(col.key, 5, col.key, true);
        } else if (col.type === 'text') {
          addExportColumn(col.key, 20, col.key, false);
        } else {
          // select
          addExportColumn(col.key, 12, col.key, false, !!col.hasNumSuffix);
          // 各部（kakubu）の直後、本来「仕上げ材」があった位置に、shiage列自体が無いタブでのみ空白列を補う
          if (col.key === 'kakubu' && !hasShiage) addBlankColumn();
        }
      });
      return { headers, widths, fieldPlan };
    }

    // 名称列のような hasNumSuffix 列の値（例:「外部1」）を、Excel出力時に
    // 文字部分と数字部分の間に半角スペースを入れた形（例:「外部 1」）に変換する。
    // 末尾が数字でない場合（数字を選ばず確定した場合など）はそのまま返す。
    function formatNumSuffixForExport(value) {
      if (!value) return value;
      const m = String(value).match(/^(.*\D)(\d+)$/);
      return m ? `${m[1]} ${m[2]}` : value;
    }

    // 「サイディング」「フローリング」の2つの選択肢は、Excel出力時のみ全角カタカナから
    // 半角カタカナに変換する（マスターの依頼により、Excel上での見た目・列幅を他の略称系の
    // 選択肢（GL・Co・CB・AS等）に近づけるための対応）。画面上の表示・選択肢一覧・
    // 保存データ（localStorage）は全角のまま変更しない。完全一致の場合のみ変換するため、
    // 自由入力で似た文字列を入力した場合などは対象外（意図的に安全側に倒している）。
    const EXPORT_HALFWIDTH_MAP = {
      'サイディング': 'ｻｲﾃﾞｨﾝｸﾞ',
      'フローリング': 'ﾌﾛｰﾘﾝｸﾞ',
    };
    const toExportHalfWidth = value => EXPORT_HALFWIDTH_MAP[value] || value;

    // 全タブ（現在アクティブなタブ＋削除済みアーカイブの両方）・全行の入力内容をJSON形式の
    // バックアップファイルとしてダウンロードする。「保存（Excel出力）」のたび・「全削除」の直前に、
    // 自動で呼び出される（ボタン操作は無し）。
    // v1.07〜: タブ構成（App.tabs・App.deletedTabs）自体もタブごとの入力データも失われないよう、
    // フォーマットをv1（{tabs:{プリセットID:行データ}}）からv2（{activeTabs, deletedTabs, data:{storageKey:行データ}}）に変更した。
    // 旧v1形式のファイルは importBackupFile() 側で引き続き読み込める（後方互換）。
    function createJsonBackupFile() {
      const payload = { app: 'jtable', version: 2, exportedAt: new Date().toISOString(), activeTabs: App.tabs, deletedTabs: App.deletedTabs, data: {} };
      const allKeys = new Set([...App.tabs.map(t => t.storageKey), ...App.deletedTabs.map(t => t.storageKey)]);
      allKeys.forEach(key => {
        const raw = localStorage.getItem(key);
        payload.data[key] = raw ? JSON.parse(raw) : [];
      });
      const json = JSON.stringify(payload);
      // iOSのSafariは application/json をブラウザ上でテキスト表示してしまう（ファイル保存にならない）ため、
      // 従来は text/plain に変換していたが、実機検証の結果 text/plain だと保存時にSafari側が
      // ファイル名の末尾へさらに「.txt」を付け足してしまい、「〜.json.txt」という二重拡張子になる
      // 不具合が判明した（「開く」ボタンの選択ダイアログはjson/拡張子で絞り込んでいるため、
      // 二重拡張子になったファイルが復元対象として表示されなくなってしまう）。
      // xlsx出力（downloadBlob内）で実績のある application/octet-stream に変更したところ、
      // インライン表示は避けつつ、ファイル名（拡張子）もそのまま保持されることを確認した。
      // 非iOS環境では従来どおり application/json のままダウンロードする。
      const mimeType = IS_IOS_DEVICE ? 'application/octet-stream' : 'application/json';
      const blob = new Blob([json], { type: mimeType });
      // ファイル名のベースは案件名（入力されていればそれをそのまま、未入力なら既定の
      // 'jtable_backup'）。Excel出力と同じprojectFilenameBase()を使用（Jstampと統一した方式）。
      downloadBlob(blob, `${projectFilenameBase('jtable_backup')}_${genTimestamp()}.json`);
    }

    function exportToExcel() {
      if (App.tabs.length === 0) { showToast('タブがありません。タブ管理からタブを追加してください'); return; }
      if (typeof XLSX === 'undefined') { showToast('XLSX library not loaded'); return; }

      function tabRows(inst) {
        const columns = PRESET_DEFS[inst.presetId].columns;
        const { fieldPlan } = buildExportSpec(columns);
        const rows = loadTabData(inst.id);

        let lastIdx = -1;
        rows.forEach((d, i) => {
          const hasValue = fieldPlan.some(({ field, isNum }) =>
            isNum ? (d[field] !== 0 && !isZeroNum(d[field])) : !!d[field]);
          if (hasValue) lastIdx = i;
        });
        if (lastIdx === -1) return [];

        return rows.slice(0, lastIdx + 1).map((d, i) => [
          i + 1,
          ...fieldPlan.map(({ field, isNum, hasNumSuffix, asText }) => {
            if (isNum) {
              if (isZeroNum(d[field])) return '';
              // asText: L/W・mm等、小数を扱いうる数値項目は文字列として書き出す（入力した通りの
              // 見た目でそのまま表示させるため）。箇所（カウンター）は引き続き数値のまま出力する。
              return asText ? String(d[field]) : Number(d[field]);
            }
            const raw = d[field] || '';
            if (hasNumSuffix) return formatNumSuffixForExport(raw);
            return toExportHalfWidth(raw);
          })
        ]);
      }

      const sheetData = {}, merges = [];
      let colOffset = 0;
      const colsSpec = [];
      App.tabs.forEach(inst => {
        const { headers, widths } = buildExportSpec(PRESET_DEFS[inst.presetId].columns);
        const dataRows = tabRows(inst);
        // シート上の見出しは、プリセット名ではなくインスタンスの表示名（マスターが編集できる）を使う。
        // 同じプリセットを複数タブ追加した場合でも、それぞれの名前で区別できるようにするため。
        sheetData[`0,${colOffset}`] = `[${inst.label}]`;
        merges.push({ s:{r:0,c:colOffset}, e:{r:0,c:colOffset+headers.length-1} });
        headers.forEach((h, ci) => { sheetData[`1,${colOffset+ci}`] = h; });
        dataRows.forEach((row, ri) => row.forEach((v, ci) => { sheetData[`${2+ri},${colOffset+ci}`] = v; }));
        colOffset += headers.length + 1;
        widths.forEach(w => colsSpec.push({ wch: w }));
        colsSpec.push({ wch: 3 }); // タブ間の区切り列
      });

      const maxRow = Math.max(...Object.keys(sheetData).map(k => parseInt(k))) + 1;
      const aoa    = Array.from({ length: maxRow }, (_, r) =>
        Array.from({ length: colOffset }, (_, c) => sheetData[`${r},${c}`] ?? ''));

      const wb = XLSX.utils.book_new();
      const ws = XLSX.utils.aoa_to_sheet(aoa);
      ws['!merges'] = merges;
      ws['!cols']   = colsSpec.slice(0, colOffset);
      XLSX.utils.book_append_sheet(wb, ws, 'survey');

      // ファイル名のベースは案件名（入力されていればそれをそのまま、未入力なら既定の'survey'）。
      // Jstampと統一した方式（sanitizeForFilename()/projectFilenameBase()参照）。
      const fileName = `${projectFilenameBase('survey')}_${genTimestamp()}.xlsx`;

      try {
        const blob = new Blob(
          [XLSX.write(wb, { bookType: 'xlsx', type: 'array' })],
          { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' }
        );
        downloadBlob(blob, fileName);
        // ブラウザが「同時に複数ファイルがダウンロードされた」と判定してブロックすることがあるため、
        // JSON バックアップの方は少し時間をずらしてダウンロードを開始する
        setTimeout(createJsonBackupFile, 800);
        showToast('Excelとバックアップを保存しました');
        clearAllTempOptions(); // 出力成功時、自由入力による一時選択肢を全タブ・全列分まとめて消去する
        App.hasUnsavedChanges = false; // 保存済みになったので、全削除時の追加確認の判定をリセットする
      } catch {
        try {
          XLSX.writeFile(wb, fileName);
          setTimeout(createJsonBackupFile, 800);
          showToast('Excelとバックアップを保存しました');
          clearAllTempOptions();
          App.hasUnsavedChanges = false;
        }
        catch (e) { showToast('Download failed: ' + e.message); }
      }
    }

    /* ── 復元（ファイルから書き戻す） ──
       Excel出力（保存）とは別に、入力内容そのもの（全タブ・全行）をJSONファイルから読み込んで
       復元できるようにしたもの。ヘッダーの「📂 開く」ボタンから直接ファイル選択を呼び出す。 */
    function triggerImportFile() {
      document.getElementById('backupFileInput').click();
    }

    // インポート完了後に共通で行う再描画処理（v2形式・旧v1形式どちらの復元でも使う）
    function afterTabsReplaced() {
      App.tabDataCache = {};
      App.tabPositions = {}; // 復元によりタブ構成自体が変わるため、記憶していた表示位置もクリアする
      App.activeTabId = App.tabs.length > 0 ? App.tabs[0].id : null;
      renderTabBar();
      updateEmptyStateVisibility();
      if (App.activeTabId) {
        App.tabs.forEach(t => loadTabData(t.id));
        updateAllTabBadges();
        setDrumRow(0); // renderAllRows()より前にセットする
        buildLayoutForActiveTab();
        calculateDimensions();
        updateColumnWidths();
        renderAllRows();
        setHorizontalScroll(0);
        updateRowInfo();
        updateTabTapZones();
        lastRenderedTabId = App.activeTabId;
      }
      updateUndoRedoBtns();
      App.hasUnsavedChanges = false; // 復元直後はファイルの内容そのものなので、未保存扱いにはしない
    }

    function importBackupFile(event) {
      const file = event.target.files[0];
      event.target.value = ''; // 同じファイルを連続で選び直しても変更イベントが発生するようにリセット
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async () => {
        let data;
        try { data = JSON.parse(reader.result); }
        catch (e) { showToast('ファイルの読み込みに失敗しました'); return; }
        if (!data) { showToast('バックアップファイルの形式が正しくありません'); return; }

        // v2形式（activeTabs/deletedTabs/dataを持つ、v1.07〜のバックアップ）
        if (Array.isArray(data.activeTabs)) {
          const ok = await showConfirm('現在のタブ構成・入力内容を上書きして復元します。よろしいですか？', '復元する');
          if (!ok) return;
          Object.keys(data.data || {}).forEach(key => {
            localStorage.setItem(key, JSON.stringify(data.data[key]));
          });
          App.tabs = data.activeTabs;
          App.deletedTabs = Array.isArray(data.deletedTabs) ? data.deletedTabs : [];
          persistTabs(); persistDeletedTabs();
          afterTabsReplaced();
          showToast('バックアップから復元しました');
          return;
        }

        // v1形式（旧バージョン、{tabs:{プリセットID:行データ}}）の後方互換読み込み。
        // 各プリセットを新規タブインスタンスとして作り直す（従来のタブ順で復元）。
        if (data.tabs && typeof data.tabs === 'object') {
          const validPresetIds = PRESET_ORDER.filter(id => Array.isArray(data.tabs[id]));
          if (validPresetIds.length === 0) { showToast('復元できるデータが見つかりませんでした'); return; }
          const ok = await showConfirm('現在のタブ構成・入力内容を上書きして復元します（旧形式のバックアップです）。よろしいですか？', '復元する');
          if (!ok) return;
          App.tabs = validPresetIds.map(presetId => {
            const storageKey = LEGACY_STORAGE_KEYS[presetId];
            localStorage.setItem(storageKey, JSON.stringify(data.tabs[presetId]));
            return { id: 'legacy_' + presetId, presetId, label: PRESET_DEFS[presetId].label, storageKey };
          });
          persistTabs();
          afterTabsReplaced();
          showToast('旧形式のバックアップから復元しました');
          return;
        }

        showToast('バックアップファイルの形式が正しくありません');
      };
      reader.onerror = () => showToast('ファイルの読み込みに失敗しました');
      reader.readAsText(file);
    }

    /* ── 全削除（全タブ・全行の入力内容を一斉消去） ──
       ヘッダーの「🗑 全削除」ボタンから呼び出す。元に戻せない操作のため、必ず確認を取る。
       さらに「保存（Excel出力）」がまだ行われていない入力内容がある場合は、追加でもう一度確認する。 */
    async function confirmDeleteAll() {
      if (App.tabs.length === 0) { showToast('タブがありません'); return; }
      const ok1 = await showConfirm('削除する前にJSONバックアップファイルを自動で保存します。全タブの入力内容をすべて削除します。この操作は元に戻せません。よろしいですか？', '削除する');
      if (!ok1) return;
      if (App.hasUnsavedChanges) {
        const ok2 = await showConfirm('まだ保存（Excel出力）していない入力内容があります。保存せずに削除してもよろしいですか？', '削除する');
        if (!ok2) return;
      }
      performDeleteAll();
    }

    // 全削除は「タブ自体」ではなく「各タブの入力内容（行データ）」のみを消去する
    // （タブの追加・削除自体はタブ管理から行う操作のため、この機能では触らない）。
    // アーカイブ（削除済みタブ）のデータには影響しない。
    function performDeleteAll() {
      createJsonBackupFile(); // 削除前の内容を最後の保険として自動でバックアップしておく
      App.tabs.forEach(t => {
        const key = t.storageKey;
        localStorage.removeItem(key);
        localStorage.removeItem(key + '_bak'); // ローリングバックアップも消さないと、次回起動時に復元確認が出てしまう
        delete App.tabDataCache[t.id];
      });
      clearAllTempOptions();
      App.undoStack = {}; // アンドゥ履歴も全クリア（全削除後に「戻す」で復活しないよう）
      App.redoStack = {}; // やり直し履歴も同様に全クリア
      App.tabs.forEach(t => loadTabData(t.id));
      updateAllTabBadges();
      if (App.activeTabId) { buildLayoutForActiveTab(); renderAllRows(); }
      updateUndoRedoBtns();
      App.hasUnsavedChanges = false;
      showToast('バックアップを保存し、全データを削除しました');
    }

    /* ── 案件名表示（ドラム領域左上に常時表示するインライン入力欄） ──
       Jstampと統一感を出すため、同じ仕組み・見た目に合わせた（v1.19）。
       入力するたびにoninputでそのままlocalStorageへ保存し、タップしてダイアログを開くような
       仲介は挟まない。旧バージョンにあった「様」の付加・棟番号等の連番機能（Jstampには無い機能）は
       統一のため廃止した。ファイル名の組み立ては sanitizeForFilename()/projectFilenameBase() が
       Excel出力・JSONバックアップの両方から共通で呼ばれる（Jstampの sanitizeForFilename()/
       saveFilenameBase() と同じ役割）。 */
    function onProjectNameInput(value) {
      App.projectName = value;
      localStorage.setItem('jtable_project_name', App.projectName);
    }

    // ファイル名に使えない文字（\/:*?"<>|）をアンダースコアに置き換える（Jstampと同じ変換方式。
      // 旧バージョンはこれらの文字を除去するだけだったが、Jstampに合わせて置換に統一した）。
    function sanitizeForFilename(s) {
      return s.replace(/[\\/:*?"<>|]/g, '_');
    }

    // Excel出力・JSONバックアップのファイル名のベース部分を組み立てる。
    // 案件名が入力されていればそれをそのままベースにし（Jstampと同じく「survey_」等の接頭辞は付かない）、
    // 未入力の場合はdefaultBase（呼び出し元ごとの既定のベース名）を使う。
    function projectFilenameBase(defaultBase) {
      const trimmed = (App.projectName || '').trim();
      return trimmed ? sanitizeForFilename(trimmed) : defaultBase;
    }

    /* ── 起動時のローリングバックアップ通知・復元確認 ──
       init()内、全タブのデータ読み込み直後に呼び出す。
       ・autoRecoveredTabs：メインデータが破損していたためバックアップから自動復旧済み → 結果を知らせるだけ
       ・possibleLostTabs：メインデータが見つからずバックアップにのみ入力済みデータが残っている
         → 上書きしてよいか分からないため、ダイアログで確認してから復元する */
    function notifyStartupRecoveryStatus() {
      if (App.autoRecoveredTabs.length > 0) {
        const labels = App.autoRecoveredTabs.map(id => (getTabInstance(id) || {}).label || id).join('・');
        showToast(`データの異常を検知し、直前の保存内容から自動復旧しました（${labels}）`);
      }
      if (App.possibleLostTabs.length > 0) {
        const labels = App.possibleLostTabs.map(id => (getTabInstance(id) || {}).label || id).join('・');
        document.getElementById('restorePromptText').textContent =
          `保存されていたはずのデータ（${labels}）が見つかりませんでした。直前の保存内容のバックアップが残っています。復元しますか？`;
        document.getElementById('restorePromptOverlay').classList.add('show');
      }
    }

    function applyRollingRestore() {
      App.possibleLostTabs.forEach(tabId => {
        const inst = getTabInstance(tabId);
        if (!inst) return;
        const bak = localStorage.getItem(inst.storageKey + '_bak');
        if (!bak) return;
        localStorage.setItem(inst.storageKey, bak);
        delete App.tabDataCache[tabId];
      });
      App.tabs.forEach(t => loadTabData(t.id));
      App.possibleLostTabs = [];
      updateAllTabBadges();
      if (App.activeTabId) { buildLayoutForActiveTab(); renderAllRows(); }
      document.getElementById('restorePromptOverlay').classList.remove('show');
      showToast('バックアップから復元しました');
    }

    function dismissRollingRestore() {
      App.possibleLostTabs = [];
      document.getElementById('restorePromptOverlay').classList.remove('show');
    }

    /* ══════════════════════════════════════════════════════════════
       ── タブ管理システム（v1.07〜） ──
       以前は「内部①・内部②…」の7タブが固定で常に表示されていたが、v1.07からは
       PRESET_DEFS（7つのプリセット）を元に、マスターが「タブ管理」画面から自由に
       タブを追加・削除・並び替え・改名できるようにした。
       - App.tabs        : 現在画面に表示されているタブ（インスタンス）の配列（表示順）
       - App.deletedTabs : 削除したタブのアーカイブ（データは消さずに残す。復元・完全削除ができる）
       それぞれ localStorage の jtable_tabs_v2 / jtable_deleted_tabs_v2 に永続化する。
       ══════════════════════════════════════════════════════════════ */

    function persistTabs() { localStorage.setItem('jtable_tabs_v2', JSON.stringify(App.tabs)); }
    function persistDeletedTabs() { localStorage.setItem('jtable_deleted_tabs_v2', JSON.stringify(App.deletedTabs)); }

    // 新しいタブインスタンス用の一意なIDを発行する（localStorageに連番カウンタを保持し、
    // アプリを再起動してもIDが重複しないようにする）。
    function nextTabInstanceId() {
      const n = (parseInt(localStorage.getItem('jtable_tab_id_seq'), 10) || 0) + 1;
      localStorage.setItem('jtable_tab_id_seq', String(n));
      return 't' + n;
    }

    // v1.06以前（固定7タブ）からv1.07（自由に追加・削除できるタブ）への一度きりの移行処理。
    // 「タブ一覧は空の状態から始め、既存の入力データは消さずアーカイブに登録しておき、
    //  マスターが手動でタブ管理から復元・追加する」という方針（マスターとの合意事項）に基づく。
    // 実データ（localStorageの各キー）自体は一切移動・変更しない。アーカイブへの登録のみ行う。
    function migrateLegacyTabsIfNeeded() {
      if (localStorage.getItem('jtable_migrated_v2') === 'true') return;
      Object.keys(LEGACY_STORAGE_KEYS).forEach(presetId => {
        const key = LEGACY_STORAGE_KEYS[presetId];
        if (localStorage.getItem(key) !== null) {
          App.deletedTabs.push({
            id: 'legacy_' + presetId,
            presetId,
            label: PRESET_DEFS[presetId].label,
            storageKey: key,
            deletedAt: new Date().toISOString(),
          });
        }
      });
      localStorage.setItem('jtable_migrated_v2', 'true');
      persistTabs();
      persistDeletedTabs();
    }

    // 起動時、タブ一覧・アーカイブをlocalStorageから読み込む（init()から呼ぶ）。
    function loadTabsState() {
      try { App.tabs = JSON.parse(localStorage.getItem('jtable_tabs_v2') || '[]'); } catch (e) { App.tabs = []; }
      try { App.deletedTabs = JSON.parse(localStorage.getItem('jtable_deleted_tabs_v2') || '[]'); } catch (e) { App.deletedTabs = []; }
      migrateLegacyTabsIfNeeded();
    }

    // タブバー（画面上部のタブ切り替えボタン）をApp.tabsの内容から再構築する。
    // タブの追加・削除・並び替え・改名のたびに呼び出す。
    function renderTabBar() {
      const bar = document.getElementById('tabBar');
      bar.innerHTML = App.tabs.map(t => `
        <button class="tab-btn${t.id === App.activeTabId ? ' active' : ''}" data-tab="${t.id}" onclick="switchTab('${t.id}')">
          <span class="tab-label">${escHtml(t.label)}</span>
          <span class="tab-data-badge" id="badge_${t.id}"></span>
        </button>`).join('');
      updateAllTabBadges();
      requestAnimationFrame(updateTabTapZones);
    }

    // タブが1つも無い場合、テーブル領域を通常のドラム表示から案内表示に切り替える。
    function updateEmptyStateVisibility() {
      const empty = App.tabs.length === 0;
      document.getElementById('tableEmptyState').style.display = empty ? 'flex' : 'none';
      document.getElementById('tableHeaderWrapper').style.display = empty ? 'none' : '';
      document.getElementById('tableScrollWrapper').style.display = empty ? 'none' : '';
    }

    /* ── タブ管理モーダルの開閉 ── */
    function openTabManager() {
      renderTabManagerLists();
      renderTabManagerPresetOptions();
      document.getElementById('tabMgrOverlay').classList.add('show');
    }
    function closeTabManager() {
      document.getElementById('tabMgrOverlay').classList.remove('show');
    }

    // プリセットのプルダウン（PRESET_ORDER順）を組み立てる
    function renderTabManagerPresetOptions() {
      const select = document.getElementById('tabMgrPresetSelect');
      select.innerHTML = PRESET_ORDER.map(id => `<option value="${id}">${escHtml(PRESET_DEFS[id].label)}</option>`).join('');
    }

    // 「現在のタブ」一覧・「削除済み（アーカイブ）」一覧の両方を再描画する
    function renderTabManagerLists() {
      const activeList = document.getElementById('tabMgrActiveList');
      if (App.tabs.length === 0) {
        activeList.innerHTML = '<div class="tabmgr-empty">タブがありません。下のプルダウンから追加してください</div>';
      } else {
        activeList.innerHTML = App.tabs.map(t => `
          <div class="tabmgr-item" data-id="${t.id}">
            <span class="tabmgr-drag-handle">☰</span>
            <div class="tabmgr-item-main" onclick="renameTabInstance('${t.id}')">
              <span class="tabmgr-item-label">${escHtml(t.label)}</span>
              <span class="tabmgr-item-preset">${escHtml(PRESET_DEFS[t.presetId].label)}</span>
            </div>
            <button class="tabmgr-del-btn" onclick="deleteActiveTabInstance('${t.id}')">✕</button>
          </div>`).join('');
        setupTabMgrDragReorder();
      }

      const archiveList = document.getElementById('tabMgrArchiveList');
      if (App.deletedTabs.length === 0) {
        archiveList.innerHTML = '<div class="tabmgr-empty">削除済みのタブはありません</div>';
      } else {
        // 新しく削除されたものほど上に表示する
        archiveList.innerHTML = [...App.deletedTabs].reverse().map(t => `
          <div class="tabmgr-item tabmgr-archive-item">
            <div class="tabmgr-item-main">
              <span class="tabmgr-item-label">${escHtml(t.label)}</span>
              <span class="tabmgr-item-preset">${escHtml(PRESET_DEFS[t.presetId].label)}</span>
            </div>
            <div class="tabmgr-archive-btns">
              <button class="tabmgr-restore-btn" onclick="restoreArchivedTab('${t.id}')">復元</button>
              <button class="tabmgr-purge-btn" onclick="purgeArchivedTab('${t.id}')">完全に削除</button>
            </div>
          </div>`).join('');
      }
    }

    // 「タブを追加」プルダウン＋追加ボタン。同じプリセットの削除履歴（直近1件）があれば、
    // 復元するか空の状態で新しく追加するかを確認してから処理する。
    async function addTabFromPreset() {
      const presetId = document.getElementById('tabMgrPresetSelect').value;
      if (!presetId || !PRESET_DEFS[presetId]) return;
      const candidates = App.deletedTabs.filter(t => t.presetId === presetId);
      if (candidates.length > 0) {
        const toRestore = candidates[candidates.length - 1]; // 直近に削除した1件
        const ok = await showConfirm(
          `以前削除した「${toRestore.label}」のデータが見つかりました。復元しますか？（「新規で追加」を選ぶと空の状態で追加します）`,
          '復元する', '新規で追加'
        );
        if (ok) {
          App.deletedTabs = App.deletedTabs.filter(t => t !== toRestore);
          App.tabs.push({ id: toRestore.id, presetId: toRestore.presetId, label: toRestore.label, storageKey: toRestore.storageKey });
          persistTabs(); persistDeletedTabs();
          finishTabListChange(`「${toRestore.label}」を復元しました`);
          return;
        }
      }
      const preset = PRESET_DEFS[presetId];
      const id = nextTabInstanceId();
      const storageKey = 'chosaApp_inst_' + id;
      App.tabs.push({ id, presetId, label: preset.label, storageKey });
      persistTabs();
      finishTabListChange(`「${preset.label}」を追加しました`);
    }

    // 現在アクティブなタブを削除する（データはアーカイブに残る。実データは消さない）。
    async function deleteActiveTabInstance(id) {
      const inst = getTabInstance(id);
      if (!inst) return;
      const ok = await showConfirm(`「${inst.label}」を削除します。入力内容はアーカイブに残り、後から復元できます。よろしいですか？`, '削除する');
      if (!ok) return;
      App.tabs = App.tabs.filter(t => t.id !== id);
      App.deletedTabs.push({ id: inst.id, presetId: inst.presetId, label: inst.label, storageKey: inst.storageKey, deletedAt: new Date().toISOString() });
      delete App.tabDataCache[id];
      delete App.undoStack[id];
      delete App.redoStack[id];
      // 記憶していた表示位置も消す。アーカイブから復元した時に同じインスタンスIDを再利用するため、
      // ここで消しておかないと「復元＝新規扱いで初期位置から」という仕様に反して
      // 削除前の位置を引き継いでしまう。
      delete App.tabPositions[id];
      persistTabs(); persistDeletedTabs();
      if (App.activeTabId === id) App.activeTabId = App.tabs.length > 0 ? App.tabs[0].id : null;
      finishTabListChange(`「${inst.label}」を削除しました`);
    }

    // アーカイブから直接復元する（「タブを追加」のプリセット選択を介さず、一覧から直接選べる）。
    function restoreArchivedTab(id) {
      const inst = App.deletedTabs.find(t => t.id === id);
      if (!inst) return;
      App.deletedTabs = App.deletedTabs.filter(t => t.id !== id);
      App.tabs.push({ id: inst.id, presetId: inst.presetId, label: inst.label, storageKey: inst.storageKey });
      persistTabs(); persistDeletedTabs();
      finishTabListChange(`「${inst.label}」を復元しました`);
    }

    // アーカイブから完全に削除する（実データ・ローリングバックアップごと消去。元に戻せない）。
    async function purgeArchivedTab(id) {
      const inst = App.deletedTabs.find(t => t.id === id);
      if (!inst) return;
      const ok = await showConfirm(`「${inst.label}」のデータを完全に削除します。元に戻せません。よろしいですか？`, '完全に削除する');
      if (!ok) return;
      localStorage.removeItem(inst.storageKey);
      localStorage.removeItem(inst.storageKey + '_bak');
      App.deletedTabs = App.deletedTabs.filter(t => t.id !== id);
      delete App.tabPositions[id]; // 念のため（通常はdeleteActiveTabInstance側で既に消えている）
      persistDeletedTabs();
      renderTabManagerLists();
      showToast(`「${inst.label}」を完全に削除しました`);
    }

    // タブ名の編集（タブ管理一覧の項目タップで開く）
    async function renameTabInstance(id) {
      const inst = getTabInstance(id);
      if (!inst) return;
      const result = await showTextPrompt('タブ名を編集', inst.label);
      if (result === null) return;
      const trimmed = result.trim();
      if (!trimmed) return;
      inst.label = trimmed;
      persistTabs();
      finishTabListChange();
    }

    // タブ追加・削除・復元・改名のたびに行う共通の再描画処理。
    function finishTabListChange(toastMsg) {
      // タブが1つも無い状態から追加・復元された場合、自動的にそのタブをアクティブにする
      if (!App.activeTabId && App.tabs.length > 0) App.activeTabId = App.tabs[0].id;
      renderTabManagerLists();
      renderTabBar(); // ← この中でupdateAllTabBadges()が全タブ分loadTabData()を呼ぶため、
                       //   tabDataCacheの有無では「画面構築済みか」を判定できない（下記参照）
      updateEmptyStateVisibility();
      // 現在アクティブなタブの画面（ヘッダー・行）がまだ構築されていない場合のみ、新規に構築する。
      // 判定にはtabDataCache（行データのキャッシュ）ではなくlastRenderedTabIdを使う。
      // renderTabBar()が呼ぶupdateAllTabBadges()は全タブ分loadTabData()を実行するため、
      // 「まだ画面を作っていない新しいタブ」でもtabDataCacheには先にエントリができてしまい、
      // tabDataCacheの有無で判定すると常に「構築済み」と誤判定してしまう
      // （v1.10まで、タブ追加直後にヘッダー・行が空白のままになる不具合の原因だった）。
      if (App.activeTabId && App.activeTabId !== lastRenderedTabId) {
        loadTabData(App.activeTabId);
        // 保存されている最終表示位置を復元する（新規タブ・アーカイブから復元したタブは
        // getSavedTabPosition()が初期位置を返すので、自然に「新規は初期位置から」になる）。
        // Drum.currentRowはrenderAllRows()がどの行を「アクティブ行」として描画するかを
        // 左右するため、renderAllRows()より前に必ずセットしておく。
        const pos = getSavedTabPosition(App.activeTabId);
        setDrumRow(pos.row);
        buildLayoutForActiveTab();
        calculateDimensions();
        updateColumnWidths();
        renderAllRows();
        setHorizontalScroll(pos.scrollLeft);
        updateRowInfo();
        updateUndoRedoBtns();
        updateTabTapZones();
        lastRenderedTabId = App.activeTabId;
      } else if (App.activeTabId) {
        updateTabBadge(App.activeTabId);
      }
      if (toastMsg) showToast(toastMsg);
    }

    /* ── タブ管理一覧のドラッグ並び替え（Pointer Events） ──
       行の「☰」ハンドルを掴んで上下にドラッグすると、指の位置に応じてDOM要素そのものを
       直接並び替える（insertBefore/appendChildで移動するだけで、リストのinnerHTMLは
       ドラッグ中は一切作り直さない）。指を離した時点でDOM上の最終的な並び順から
       App.tabsを再構築し、localStorageへ保存・メインのタブバーにも反映する。
       この並び替えはタブ管理モーダル内だけで完結しており、メインテーブルの縦ドラッグ（Drum）とは
       別のシンプルな実装（順序の入れ替えのみ、慣性やスナップアニメーションは持たない）。

       v1.18〜: move/upのリスナーはハンドル自身ではなく document に登録している。
       ハンドル（☰、28×28px）は指の太さに対してかなり小さく、setPointerCaptureが効いていない
       環境（一部のWebKitバージョンで実際にありうる）だと、指がハンドルの上から少しでもズレた
       瞬間にhandle宛のイベントが届かなくなり、「指を動かしても追従してこない」不具合になっていた。
       documentへ登録すれば、指が画面上のどこにあってもmove/upのイベントを確実に拾えるため、
       setPointerCaptureの成否に依存しなくなる（setPointerCapture自体は保険として引き続き試みる）。
       また、並び替え判定（他の項目との位置比較、複数のoffsetTop読み取りを伴う）は指の動きの
       たびに毎回行うと重くなりうるため、requestAnimationFrameで1フレームに1回まで間引いている
       （見た目の追従に直結するtransformの更新自体は間引かず、毎回のpointermoveで即座に反映する）。 */
    function setupTabMgrDragReorder() {
      const list = document.getElementById('tabMgrActiveList');

      list.querySelectorAll('.tabmgr-item').forEach(item => {
        const handle = item.querySelector('.tabmgr-drag-handle');
        if (!handle) return;

        handle.onpointerdown = e => {
          e.preventDefault();
          const dragEl = item;
          let startY = e.clientY;
          let startTop = dragEl.offsetTop;
          let latestDy = 0;
          let rafId = null;
          dragEl.classList.add('dragging');
          // setPointerCaptureも保険として試みる（対応環境では効く）。失敗しても、以下の
          // document直付けのリスナーにより並び替え自体は問題なく機能する。
          try { handle.setPointerCapture(e.pointerId); } catch (err) { /* 未対応環境向けの保険 */ }

          // 並び替え判定（他の項目との位置比較）。rAFで1フレームに1回まで間引いて呼ぶ。
          const checkSwap = () => {
            rafId = null;
            const dy = latestDy;
            const dragMid = startTop + dy + dragEl.offsetHeight / 2;
            const siblings = [...list.children].filter(el => el !== dragEl);
            let target = null;
            for (const sib of siblings) {
              const sibMid = sib.offsetTop + sib.offsetHeight / 2;
              if (dragMid < sibMid) { target = sib; break; }
            }
            const currentNext = dragEl.nextElementSibling;
            const needsMove = target ? (target !== currentNext) : (currentNext !== null);
            if (needsMove) {
              // innerHTMLの作り直しではなく、既存のDOMノードをそのまま移動するだけなので、
              // ドラッグ中のdragEl/handle自体は最後まで同じ要素のまま（イベント・キャプチャが途切れない）
              if (target) list.insertBefore(dragEl, target);
              else list.appendChild(dragEl);
              // 移動によってdragElのレイアウト上の位置(offsetTop)が変わるため、
              // その時点の実際の指位置を新しい基準にリセットし、指の位置に違和感なく追従させる
              startTop = dragEl.offsetTop;
              startY += dy;
              latestDy = 0;
              dragEl.style.transform = 'translateY(0px)';
            }
          };

          const onMove = ev => {
            ev.preventDefault();
            latestDy = ev.clientY - startY;
            // 見た目の追従（transform）は間引かず、pointermoveのたびに毎回即座に反映する
            dragEl.style.transform = `translateY(${latestDy}px)`;
            if (rafId === null) rafId = requestAnimationFrame(checkSwap);
          };
          const onUp = () => {
            if (rafId !== null) { cancelAnimationFrame(rafId); rafId = null; }
            document.removeEventListener('pointermove', onMove);
            document.removeEventListener('pointerup', onUp);
            document.removeEventListener('pointercancel', onUp);
            dragEl.classList.remove('dragging');
            dragEl.style.transform = '';
            // DOM上の最終的な並び順（＝ユーザーが実際に見ている順番）からApp.tabsを組み直す
            const orderedIds = [...list.children].map(el => el.dataset.id);
            App.tabs = orderedIds.map(id => App.tabs.find(t => t.id === id)).filter(Boolean);
            persistTabs();
            renderTabBar();
          };
          document.addEventListener('pointermove', onMove, { passive: false });
          document.addEventListener('pointerup', onUp);
          document.addEventListener('pointercancel', onUp);
        };
      });
    }

    /* ── 汎用テキスト入力ダイアログ（タブ名編集で使用） ──
       await showTextPrompt(title, defaultValue) の形で使う。OKなら入力文字列、キャンセルならnullを返す。 */
    function showTextPrompt(title, defaultValue) {
      return new Promise(resolve => {
        const overlay   = document.getElementById('textPromptOverlay');
        const titleEl   = document.getElementById('textPromptTitle');
        const input     = document.getElementById('textPromptInput');
        const okBtn     = document.getElementById('textPromptOkBtn');
        const cancelBtn = document.getElementById('textPromptCancelBtn');
        titleEl.textContent = title;
        input.value = defaultValue || '';
        overlay.classList.add('show');
        setTimeout(() => { input.focus(); input.select(); }, 50);

        function cleanup(result) {
          overlay.classList.remove('show');
          okBtn.removeEventListener('click', onOk);
          cancelBtn.removeEventListener('click', onCancel);
          input.removeEventListener('keydown', onKeydown);
          resolve(result);
        }
        function onOk()       { cleanup(input.value); }
        function onCancel()   { cleanup(null); }
        function onKeydown(e) { if (e.key === 'Enter') onOk(); }
        okBtn.addEventListener('click', onOk);
        cancelBtn.addEventListener('click', onCancel);
        input.addEventListener('keydown', onKeydown);
      });
    }

    /* ── 汎用確認ダイアログ（ブラウザ標準のconfirm()は使わず、アプリ内デザインのポップアップで確認を取る） ──
       await showConfirm('メッセージ') の形で使う。OKならtrue、キャンセルならfalseが返る。 */
    function showConfirm(message, okLabel = '実行する', cancelLabel = 'キャンセル') {
      return new Promise(resolve => {
        const overlay   = document.getElementById('confirmOverlay');
        const okBtn     = document.getElementById('confirmOkBtn');
        const cancelBtn = document.getElementById('confirmCancelBtn');
        document.getElementById('confirmMessage').textContent = message;
        okBtn.textContent     = okLabel;
        cancelBtn.textContent = cancelLabel;
        overlay.classList.add('show');

        function cleanup(result) {
          overlay.classList.remove('show');
          okBtn.removeEventListener('click', onOk);
          cancelBtn.removeEventListener('click', onCancel);
          resolve(result);
        }
        function onOk()     { cleanup(true); }
        function onCancel() { cleanup(false); }
        okBtn.addEventListener('click', onOk);
        cancelBtn.addEventListener('click', onCancel);
      });
    }

    /* ── Toast ── */
    // タイマーIDを保持し、連続呼び出し時に前のタイマーをクリアしてから新しいタイマーをセットする。
    // これにより、↑同コピーの連打などで複数のタイマーが累積し、表示時間がずれる問題を防ぐ。
    let _toastTimer = null;
    function showToast(msg, duration = 2500) {
      const t = document.getElementById('toast');
      if (_toastTimer) { clearTimeout(_toastTimer); _toastTimer = null; }
      t.textContent = msg; t.classList.add('show');
      _toastTimer = setTimeout(() => { t.classList.remove('show'); _toastTimer = null; }, duration);
    }

    /* ── キーボードショートカット ── */
    document.addEventListener('keydown', e => {
      if (['INPUT','SELECT','TEXTAREA'].includes(document.activeElement.tagName)) return;
      if (e.key === 'ArrowUp')   { e.preventDefault(); navigateRow(-1); }
      if (e.key === 'ArrowDown') { e.preventDefault(); navigateRow(1); }
      if (e.key === 'Escape')    { closeAllPanels(); closeNumpad(); }
    });

    /* ── 初期化 ── */
    function init() {
      loadTheme();
      loadFreq();
      App.projectName = localStorage.getItem('jtable_project_name') || '';
      document.getElementById('projectNameField').value = App.projectName;

      // 表示行数（5/7/9）を読み込む。保存値が選択肢に無い（壊れている等）場合は既定の5にする。
      const savedRows = parseInt(localStorage.getItem(VISIBLE_ROWS_KEY), 10);
      App.visibleRows = VISIBLE_ROWS_OPTIONS.includes(savedRows) ? savedRows : 5;
      updateVisibleRowsButton();

      loadTabsState(); // タブ一覧・アーカイブの読み込み（旧バージョンからの移行もここで行われる）
      App.activeTabId = App.tabs.length > 0 ? App.tabs[0].id : null;
      renderTabBar();
      updateEmptyStateVisibility();

      if (App.tabs.length > 0) {
        App.tabs.forEach(t => loadTabData(t.id));
        notifyStartupRecoveryStatus();
        updateAllTabBadges();
        buildLayoutForActiveTab();
        calculateDimensions();
        updateColumnWidths(); // buildLayoutForActiveTab時点ではDrum.rowHeightが未確定のため、ここで正しい値で再計算する
        renderAllRows();
        Drum.targetRow = Drum.currentRow;
        updateRowInfo();
        lastRenderedTabId = App.activeTabId;
      }
      updateUndoRedoBtns();
      setupEvents();
      updateTabTapZones(); // タブの初期位置・幅に合わせて当たり判定レイヤーを生成する
      window.addEventListener('resize', handleResize);
      if (typeof ResizeObserver !== 'undefined')
        new ResizeObserver(handleResize).observe(document.getElementById('drumViewport'));
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
